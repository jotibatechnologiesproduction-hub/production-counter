<!DOCTYPE html>
<html>
<head>
  <title>Production Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; background:#eee; text-align:center; }
    .topbar {
      background:#0b5394;
      color:white;
      padding:10px;
      display:flex;
      justify-content:space-between;
    }

    button { padding:5px 10px; }

    .grid {
      display:grid;
      grid-template-columns: repeat(3,1fr);
      gap:15px;
      padding:20px;
    }

    .card {
      background:white;
      border:2px solid black;
      padding:10px;
      cursor:pointer;
    }

    .title {
      background:#6aa84f;
      padding:5px;
      font-weight:bold;
    }

    #panel {
      background:white;
      padding:20px;
      margin:20px;
      display:none;
    }

    input { width:80px; margin:5px; }
  </style>
</head>

<body>

<div class="topbar">
  <h2>Production Dashboard</h2>
  <button onclick="login()">Admin Login</button>
</div>

<div class="grid">

  <div class="card" onclick="openMachine('CNC1')"><div class="title">CNC 01</div><div id="CNC1">0</div></div>
  <div class="card" onclick="openMachine('CNC2')"><div class="title">CNC 02</div><div id="CNC2">0</div></div>
  <div class="card" onclick="openMachine('CNC3')"><div class="title">CNC 03</div><div id="CNC3">0</div></div>
  <div class="card" onclick="openMachine('CNC4')"><div class="title">CNC 04</div><div id="CNC4">0</div></div>
  <div class="card" onclick="openMachine('CNC5')"><div class="title">CNC 05</div><div id="CNC5">0</div></div>

  <div class="card" onclick="openMachine('CG1')"><div class="title">CG 01</div><div id="CG1">0</div></div>
  <div class="card" onclick="openMachine('CG2')"><div class="title">CG 02</div><div id="CG2">0</div></div>
  <div class="card" onclick="openMachine('CG3')"><div class="title">CG 03</div><div id="CG3">0</div></div>
  <div class="card" onclick="openMachine('CG4')"><div class="title">CG 04</div><div id="CG4">0</div></div>

</div>

<div id="panel">
  <h2 id="machineTitle"></h2>

  <div id="adminInputs" style="display:none;">
    <p>Enter cumulative readings (every 2 hrs):</p>
    <div id="inputs"></div>
    <button onclick="saveData()">Save</button>
  </div>

  <h3>Production Chart</h3>
  <canvas id="chart"></canvas>
</div>

<script>

const apiURL = "https://script.google.com/macros/s/AKfycbw5au7GFDGARFXxl6-RVLMHpHX-9VmVFFKDa0FSig4IXt9u_f4h8rqaDY9Kv8iQfss/exec";

let isAdmin = false;
let currentMachine = "";
let chart;
let cloudData = {};

const slots = ["7-9","9-11","11-1","1-3","3-5","5-7"];

// LOGIN
function login() {
  let pass = prompt("Enter Password:");
  if (pass === "12345") {
    isAdmin = true;
    alert("Admin Mode ON");
  } else {
    alert("Wrong Password");
  }
}

// FETCH DATA FROM GOOGLE SHEET
function fetchData() {

  fetch(apiURL)
    .then(res => res.json())
    .then(data => {

      cloudData = data;

      for (let machine in data) {

        let raw = data[machine];

        let start = raw.find(v => v != 0) || 0;
        let last = raw[raw.length - 1] || start;

        let total = last - start;

        if (document.getElementById(machine)) {
          document.getElementById(machine).innerText = total;
        }
      }
    })
    .catch(err => console.log("Error fetching data"));
}

// AUTO REFRESH
setInterval(fetchData, 5000);
fetchData();

// OPEN MACHINE
function openMachine(machine) {

  currentMachine = machine;
  document.getElementById("panel").style.display = "block";
  document.getElementById("machineTitle").innerText = machine;

  let saved = cloudData[machine] || Array(6).fill("");

  if (isAdmin) {

    document.getElementById("adminInputs").style.display = "block";

    let html = "";
    for (let i = 0; i < 6; i++) {
      html += `${slots[i]} : <input type="number" id="h${i}" value="${saved[i] || ""}"><br>`;
    }

    document.getElementById("inputs").innerHTML = html;

  } else {
    document.getElementById("adminInputs").style.display = "none";
  }

  drawChart(saved);
}

// SAVE TO GOOGLE SHEET
function saveData() {

  let raw = [];

  for (let i = 0; i < 6; i++) {
    raw.push(document.getElementById("h"+i).value || 0);
  }

  let url = apiURL + "?machine=" + currentMachine + "&values=" + raw.join(",");

  fetch(url)
    .then(() => {
      alert("Saved Successfully");
      fetchData();
    });
}

// DRAW CHART
function drawChart(raw) {

  let production = [];

  for (let i = 0; i < raw.length; i++) {
    if (i == 0) production.push(0);
    else production.push((raw[i] || 0) - (raw[i-1] || 0));
  }

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'bar',
    data: {
      labels: slots,
      datasets: [{
        label: "2Hr Production",
        data: production
      }]
    }
  });
}

</script>

</body>
</html>
