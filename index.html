<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#2b3e63; color:white; text-align:center; }

.topbar {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#0b5394;
}

button {
  padding:8px 12px;
  margin:5px;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.card {
  background:white;
  color:black;
  padding:10px;
  border-radius:5px;
}

.title {
  background:#6aa84f;
  padding:5px;
  font-weight:bold;
}

#panel, #notesPanel {
  background:white;
  color:black;
  padding:20px;
  margin:20px;
  display:none;
}

textarea { width:300px; }

</style>
</head>

<body>

<div class="topbar">
  <h2>Production Dashboard</h2>
  <div>
    <button onclick="login()">Login</button>
    <button onclick="openNotes()">Admin Notes</button>
  </div>
</div>

<div class="grid">
  <div class="card" onclick="openMachine('CNC1')"><div class="title">CNC 01</div><div id="CNC1">0</div></div>
  <div class="card" onclick="openMachine('CNC2')"><div class="title">CNC 02</div><div id="CNC2">0</div></div>
  <div class="card" onclick="openMachine('CNC3')"><div class="title">CNC 03</div><div id="CNC3">0</div></div>
  <div class="card" onclick="openMachine('CNC4')"><div class="title">CNC 04</div><div id="CNC4">0</div></div>
  <div class="card" onclick="openMachine('CNC5')"><div class="title">CNC 05</div><div id="CNC5">0</div></div>

  <div class="card" onclick="openMachine('CG1')"><div class="title">CG 01</div><div id="CG1">0</div></div>
  <div class="card" onclick="openMachine('CG2')"><div class="title">CG 02</div><div id="CG2">0</div></div>
  <div class="card" onclick="openMachine('CG3')"><div class="title">CG 03</div><div id="CG3">0</div></div>
  <div class="card" onclick="openMachine('CG4')"><div class="title">CG 04</div><div id="CG4">0</div></div>
</div>

<!-- MACHINE PANEL -->
<div id="panel">
  <h2 id="machineTitle"></h2>

  <input type="file" id="imageInput">
  <button onclick="readImage()">Read Meter</button>
  <p>Detected: <span id="detected"></span></p>

  <div id="adminInputs" style="display:none;">
    <p>Enter readings:</p>
    7: <input id="h0"><br>
    9: <input id="h1"><br>
    11: <input id="h2"><br>
    13: <input id="h3"><br>
    15: <input id="h4"><br>
    17: <input id="h5"><br>
    19: <input id="h6"><br>
    <button onclick="saveData()">Save</button>
  </div>

  <canvas id="chart"></canvas>
</div>

<!-- NOTES PANEL -->
<div id="notesPanel">
  <h2>Admin Notes</h2>

  <button onclick="openSection('Y.F')">Y.F</button>
  <button onclick="openSection('G.M')">G.M</button>
  <button onclick="openSection('V.G')">V.G</button>
  <button onclick="openSection('G.G')">G.G</button>
  <button onclick="openSection('K.P')">K.P</button>
  <button onclick="openSection('R.S')">R.S</button>

  <div id="sectionPage" style="display:none;">
    <h3 id="sectionTitle"></h3>
    <textarea id="noteText"></textarea><br>
    <button onclick="saveNote()">Save</button>

    <div id="notesList"></div>
  </div>
</div>

<script>

const apiURL = "https://script.google.com/macros/s/AKfycbw5au7GFDGARFXxl6-RVLMHpHX-9VmVFFKDa0FSig4IXt9u_f4h8rqaDY9Kv8iQfss/exec";
const visionAPI = "YOUR_API_KEY_HERE";

let isAdmin = false;
let currentMachine = "";
let currentSection = "";
let chart;
let cloudData = {};

// LOGIN
function login(){
  let pass = prompt("Enter Password");
  if(pass==="12345"){ isAdmin=true; alert("Admin ON"); }
}

// FETCH DATA
function fetchData(){
  fetch(apiURL)
  .then(r=>r.json())
  .then(data=>{
    cloudData=data;
    for(let m in data){
      document.getElementById(m).innerText=(data[m][6]||0)-(data[m][0]||0);
    }
  });
}
setInterval(fetchData,5000);
fetchData();

// MACHINE
function openMachine(m){
  currentMachine=m;
  document.getElementById("panel").style.display="block";
  document.getElementById("machineTitle").innerText=m;

  let d=cloudData[m]||Array(7).fill("");

  if(isAdmin){
    document.getElementById("adminInputs").style.display="block";
    for(let i=0;i<7;i++) document.getElementById("h"+i).value=d[i];
  }

  drawChart(d);
}

// SAVE
function saveData(){
  let v=[];
  for(let i=0;i<7;i++) v.push(document.getElementById("h"+i).value||0);
  fetch(apiURL+"?machine="+currentMachine+"&values="+v.join(","));
}

// CHART
function drawChart(raw){
  let p=[];
  for(let i=1;i<raw.length;i++) p.push((raw[i]||0)-(raw[i-1]||0));

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:'bar',
    data:{labels:["9","11","13","15","17","19"],datasets:[{data:p}]}
  });
}

// OCR
async function readImage(){
  let file=document.getElementById("imageInput").files[0];
  let base64=await toBase64(file);

  let res=await fetch("https://vision.googleapis.com/v1/images:annotate?key="+visionAPI,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      requests:[{
        image:{content:base64.split(",")[1]},
        features:[{type:"TEXT_DETECTION"}]
      }]
    })
  });

  let data=await res.json();
  let num=data.responses[0].fullTextAnnotation.text.replace(/\D/g,'');

  document.getElementById("detected").innerText=num;
  document.getElementById("h1").value=num;
}

function toBase64(file){
  return new Promise(r=>{
    let reader=new FileReader();
    reader.onload=()=>r(reader.result);
    reader.readAsDataURL(file);
  });
}

// NOTES
function openNotes(){
  if(!isAdmin){alert("Admin only");return;}
  document.getElementById("notesPanel").style.display="block";
}

function openSection(s){
  currentSection=s;
  document.getElementById("sectionPage").style.display="block";
  document.getElementById("sectionTitle").innerText=s;
  loadNotes();
}

function saveNote(){
  let t=document.getElementById("noteText").value;
  fetch(apiURL+"?section="+currentSection+"&text="+encodeURIComponent(t))
  .then(()=>{document.getElementById("noteText").value="";loadNotes();});
}

function loadNotes(){
  fetch(apiURL+"?getNotes=1")
  .then(r=>r.json())
  .then(d=>{
    let html="";
    d.filter(n=>n.section===currentSection).reverse().forEach(n=>{
      html+=`<p><b>${new Date(n.date).toLocaleString()}</b><br>${n.text}</p><hr>`;
    });
    document.getElementById("notesList").innerHTML=html;
  });
}

</script>

</body>
</html>
