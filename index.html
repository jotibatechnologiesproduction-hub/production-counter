<!DOCTYPE html>
<html>
<head>
  <title>Production Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; background:#eee; text-align:center; }

    .topbar {
      background:#0b5394;
      color:white;
      padding:10px;
      display:flex;
      justify-content:space-between;
    }

    button { padding:6px 12px; margin:5px; }

    .grid {
      display:grid;
      grid-template-columns: repeat(3,1fr);
      gap:15px;
      padding:20px;
    }

    .card {
      background:white;
      border:2px solid black;
      padding:10px;
      cursor:pointer;
    }

    .title {
      background:#6aa84f;
      padding:5px;
      font-weight:bold;
    }

    #panel {
      background:white;
      padding:20px;
      margin:20px;
      display:none;
    }

    input { width:80px; margin:5px; }
  </style>
</head>

<body>

<div class="topbar">
  <h2>Production Dashboard</h2>
  <button onclick="login()">Admin Login</button>
</div>

<div class="grid">
  <div class="card" onclick="openMachine('CNC1')"><div class="title">CNC 01</div><div id="CNC1">0</div></div>
  <div class="card" onclick="openMachine('CNC2')"><div class="title">CNC 02</div><div id="CNC2">0</div></div>
  <div class="card" onclick="openMachine('CNC3')"><div class="title">CNC 03</div><div id="CNC3">0</div></div>
  <div class="card" onclick="openMachine('CNC4')"><div class="title">CNC 04</div><div id="CNC4">0</div></div>
  <div class="card" onclick="openMachine('CNC5')"><div class="title">CNC 05</div><div id="CNC5">0</div></div>

  <div class="card" onclick="openMachine('CG1')"><div class="title">CG 01</div><div id="CG1">0</div></div>
  <div class="card" onclick="openMachine('CG2')"><div class="title">CG 02</div><div id="CG2">0</div></div>
  <div class="card" onclick="openMachine('CG3')"><div class="title">CG 03</div><div id="CG3">0</div></div>
  <div class="card" onclick="openMachine('CG4')"><div class="title">CG 04</div><div id="CG4">0</div></div>
</div>

<div id="panel">
  <h2 id="machineTitle"></h2>

  <!-- OCR -->
  <input type="file" id="imageInput">
  <button onclick="readImage()">Read Meter</button>
  <p>Detected: <span id="detected"></span></p>

  <!-- Admin Inputs -->
  <div id="adminInputs" style="display:none;">
    <p>Enter readings:</p>

    7: <input type="number" id="h0"><br>
    9: <input type="number" id="h1"><br>
    11: <input type="number" id="h2"><br>
    13: <input type="number" id="h3"><br>
    15: <input type="number" id="h4"><br>
    17: <input type="number" id="h5"><br>
    19: <input type="number" id="h6"><br>

    <button onclick="saveData()">Save</button>
  </div>

  <h3>2 Hour Production</h3>
  <canvas id="chart"></canvas>
</div>

<script>

const apiURL = "https://script.google.com/macros/s/AKfycbw5au7GFDGARFXxl6-RVLMHpHX-9VmVFFKDa0FSig4IXt9u_f4h8rqaDY9Kv8iQfss/exec";

// 🔴 PUT YOUR API KEY HERE
const visionAPI = "YOUR_API_KEY_HERE";

let isAdmin = false;
let currentMachine = "";
let chart;
let cloudData = {};

// LOGIN
function login() {
  let pass = prompt("Enter Password:");
  if (pass === "12345") {
    isAdmin = true;
    alert("Admin Mode ON");
  } else {
    alert("Wrong Password");
  }
}

// FETCH DATA
function fetchData() {
  fetch(apiURL)
    .then(res => res.json())
    .then(data => {

      cloudData = data;

      for (let machine in data) {
        let raw = data[machine];
        let total = (raw[6] || 0) - (raw[0] || 0);
        document.getElementById(machine).innerText = total;
      }
    });
}
setInterval(fetchData, 5000);
fetchData();

// OPEN MACHINE
function openMachine(machine) {
  currentMachine = machine;

  document.getElementById("panel").style.display = "block";
  document.getElementById("machineTitle").innerText = machine;

  let saved = cloudData[machine] || Array(7).fill("");

  if (isAdmin) {
    document.getElementById("adminInputs").style.display = "block";

    for (let i = 0; i <= 6; i++) {
      document.getElementById("h"+i).value = saved[i] || "";
    }
  } else {
    document.getElementById("adminInputs").style.display = "none";
  }

  drawChart(saved);
}

// SAVE DATA
function saveData() {
  let raw = [];

  for (let i = 0; i <= 6; i++) {
    raw.push(document.getElementById("h"+i).value || 0);
  }

  let url = apiURL + "?machine=" + currentMachine + "&values=" + raw.join(",");

  fetch(url).then(() => {
    alert("Saved");
    fetchData();
  });
}

// DRAW CHART
function drawChart(raw) {
  let production = [];

  for (let i = 1; i < raw.length; i++) {
    production.push((raw[i] || 0) - (raw[i-1] || 0));
  }

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'bar',
    data: {
      labels: ["9","11","13","15","17","19"],
      datasets: [{
        label: "Production",
        data: production
      }]
    }
  });
}

// 🔥 OCR FUNCTION
async function readImage() {

  const file = document.getElementById("imageInput").files[0];

  if (!file) {
    alert("Select image");
    return;
  }

  const base64 = await toBase64(file);

  const response = await fetch(
    "https://vision.googleapis.com/v1/images:annotate?key=" + visionAPI,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        requests: [{
          image: { content: base64.split(",")[1] },
          features: [{ type: "TEXT_DETECTION" }]
        }]
      })
    }
  );

  const data = await response.json();

  let text = data.responses[0].fullTextAnnotation.text;

  let number = text.replace(/\D/g, '');

  document.getElementById("detected").innerText = number;

  // auto fill 9 AM field
  document.getElementById("h1").value = number;
}

// base64 converter
function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

</script>

</body>
</html>
